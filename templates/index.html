<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TaskFlow</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#07070f; color:#f0f0fa; font-family:sans-serif; min-height:100vh; }

/* LOGIN — visível por defeito, sempre */
#login-screen {
  position:fixed; inset:0; z-index:9999;
  background:#07070f;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
#login-screen.hidden { display:none; }

/* APP — escondido por defeito */
#app { display:none; height:100vh; overflow:hidden; }
#app.visible { display:flex; }

.hidden { display:none !important; }

/* Login card */
.card {
  background:#14142a; border:1px solid rgba(99,102,241,.3);
  border-radius:16px; padding:36px; width:100%; max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}
.logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; justify-content:center; }
.logo-orb {
  width:36px; height:36px; border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#a78bfa);
  display:flex; align-items:center; justify-content:center; font-size:18px;
}
.logo span { font-size:20px; font-weight:800; }
h2 { font-size:20px; font-weight:700; margin-bottom:4px; }
p { color:#8888aa; font-size:13px; margin-bottom:24px; }
label { display:block; font-size:12px; font-weight:600; color:#9090bb; margin-bottom:6px; }
input {
  width:100%; background:#1a1a32; border:1.5px solid rgba(99,102,241,.2);
  border-radius:10px; padding:11px 14px; color:#f0f0fa; font-size:14px;
  outline:none; margin-bottom:14px;
}
input:focus { border-color:#6366f1; }
.btn {
  width:100%; padding:12px; background:#6366f1; color:#fff;
  border:none; border-radius:10px; font-size:14px; font-weight:600;
  cursor:pointer; margin-top:4px;
}
.btn:hover { background:#4f52d9; }
.err { color:#ef4444; font-size:12px; margin-bottom:10px; display:none; }

/* App layout */
#sidebar { width:220px; background:#0a0a16; border-right:1px solid rgba(99,102,241,.1); padding:20px 0; flex-shrink:0; }
#main { flex:1; overflow-y:auto; padding:24px; }
.sb-logo { display:flex; align-items:center; gap:10px; padding:0 16px 20px; border-bottom:1px solid rgba(99,102,241,.1); margin-bottom:12px; }
.sb-orb { width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,#6366f1,#a78bfa); display:flex; align-items:center; justify-content:center; font-size:14px; }
.sb-name { font-size:15px; font-weight:700; }
.sb-link { display:flex; align-items:center; gap:8px; padding:9px 16px; color:#8888aa; cursor:pointer; border-radius:8px; margin:2px 8px; font-size:13px; }
.sb-link:hover, .sb-link.active { background:rgba(99,102,241,.15); color:#f0f0fa; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="card">
    <div class="logo">
      <div class="logo-orb">⚡</div>
      <span>TaskFlow</span>
    </div>
    <h2>Bem-vindo de volta</h2>
    <p>Entra na tua conta para continuar</p>

    <label>Email</label>
    <input id="email" type="email" placeholder="email@exemplo.com" autocomplete="email"/>

    <label>Password</label>
    <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password"/>

    <div class="err" id="err"></div>
    <button class="btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sb-logo">
      <div class="sb-orb">⚡</div>
      <span class="sb-name">TaskFlow</span>
    </div>
    <div class="sb-link active" onclick="loadView('dashboard')">📊 Dashboard</div>
    <div class="sb-link" onclick="loadView('kanban')">📋 Kanban</div>
    <div class="sb-link" onclick="loadView('calendar')">📅 Calendário</div>
    <div class="sb-link" onclick="loadView('notes')">📝 Notas</div>
    <div class="sb-link" onclick="loadView('team')">👥 Equipa</div>
    <div class="sb-link" onclick="loadView('reports')">📈 Relatórios</div>
    <div class="sb-link" onclick="doLogout()" style="margin-top:auto;position:absolute;bottom:20px;left:0;right:0">⏻ Sair</div>
  </div>
  <div id="main">
    <h1 id="pg-title" style="font-size:22px;font-weight:800;margin-bottom:20px">Dashboard</h1>
    <div id="view-content"></div>
  </div>
</div>

<script src="/static/js/app.js?v={{ js_v }}"></script>
<link rel="stylesheet" href="/static/css/style.css?v={{ css_v }}"/>

<script>
// Boot simples e direto
(function boot(){
  var ls = document.getElementById('login-screen');
  var ap = document.getElementById('app');

  // Garantir estado inicial correto
  ls.classList.remove('hidden');
  ap.classList.remove('visible');

  // Tentar restaurar sessão
  var saved = localStorage.getItem('tf_u');
  if(!saved){ return; }

  fetch('/api/auth/me')
    .then(function(r){ return r.json(); })
    .then(function(me){
      if(me && me.id && !me.error){
        window.S = window.S || {};
        window.S.user = me;
        if(typeof loadAll === 'function'){
          loadAll().then(function(){ showApp(); });
        } else {
          showApp();
        }
      } else {
        localStorage.removeItem('tf_u');
        localStorage.removeItem('tf_creds');
      }
    })
    .catch(function(){ localStorage.removeItem('tf_u'); });
})();

function doLogin(){
  var email = document.getElementById('email').value;
  var pass  = document.getElementById('pass').value;
  var errEl = document.getElementById('err');
  var btn   = document.querySelector('.btn');

  if(!email || !pass){ errEl.textContent='Preenche email e password.'; errEl.style.display='block'; return; }
  btn.textContent = 'A entrar...'; btn.disabled = true;

  fetch('/api/auth/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email:email, password:pass})
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    btn.textContent='Entrar'; btn.disabled=false;
    if(data.error){ errEl.textContent='⚠ '+data.error; errEl.style.display='block'; return; }
    localStorage.setItem('tf_u', JSON.stringify(data.user));
    localStorage.setItem('tf_creds', JSON.stringify({email:email, password:pass}));
    if(window.S) window.S.user = data.user;
    errEl.style.display='none';
    if(typeof loadAll === 'function'){
      loadAll().then(function(){ showApp(); });
    } else {
      showApp();
    }
  })
  .catch(function(e){
    btn.textContent='Entrar'; btn.disabled=false;
    errEl.textContent='Erro de ligação: '+e.message; errEl.style.display='block';
  });
}

function showApp(){
  document.getElementById('login-screen').classList.add('hidden');
  var ap = document.getElementById('app');
  ap.classList.add('visible');
  ap.style.display = 'flex';
  if(typeof renderDash === 'function') renderDash();
}

function doLogout(){
  fetch('/api/auth/logout', {method:'POST'});
  localStorage.removeItem('tf_u');
  localStorage.removeItem('tf_creds');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').classList.remove('hidden');
}

function loadView(v){
  document.querySelectorAll('.sb-link').forEach(function(el){ el.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('pg-title').textContent = {
    dashboard:'Dashboard', kanban:'Kanban', calendar:'Calendário',
    notes:'Notas', team:'Equipa', reports:'Relatórios'
  }[v] || v;
  if(typeof render === 'function') render(v);
}

// Input enter
document.getElementById('pass').addEventListener('keydown', function(e){
  if(e.key==='Enter') doLogin();
});
</script>
</body>
</html>
